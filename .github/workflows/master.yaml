name: MASTER

on:
  push:
    branches:
      - 'master'
    paths-ignore:
      - '**.md'
  release:
    types: [published, edited]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: [self-hosted, macOS, ARM64, umairabbasi-runner]
    permissions:
      contents: read
      packages: write
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Log in to the Container registry'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_ACTION_PERSONAL_ACCESS_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: 'Build and push'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: |-
              linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 'Deploy to K8s Deployment'
        run: |
          kubectl -n umairabbasi apply -f ./kube/prod/

      - name: 'Restart Kubernetes Deployment'
        run: |
          kubectl -n umairabbasi rollout restart deployment umairabbasi
